function buildDeckPills(){
  const cont = document.getElementById('deck-pills');
  const decks = ["Tümü","Phrasal Verbs","Günlük Fiiller","Film İfadeleri","İsimler","Sıfatlar","Zarflar","Edatlar","Özel"];
  cont.innerHTML = decks.map(d=>`<button class="deck-pill${d===currentDeck?' active':''}" onclick="setDeck('${d}')">${d}</button>`).join('');
}

function setDeck(name){
  currentDeck = name;
  const base = name==="Tümü" ? [...allCards] : allCards.filter(c=>c.deck===name);
  if(!base.length){ deckCards = allCards.slice(0,10); }
  else { deckCards = getPriorityCards(base); }
  idx = 0;
  buildDeckPills();
  updateDeckStats();
  updateProg();
  renderCard();
}

function updateDeckStats(){
  const now = Date.now();
  const sr = getSRData();
  const newCount  = deckCards.filter(c=>{ const d=sr[String(c.id)]; return !d||d.reps===0; }).length;
  const dueCount  = deckCards.filter(c=>{ const d=sr[String(c.id)]; return d&&d.reps>0&&d.due<=now; }).length;
  const doneCount = deckCards.filter(c=>{ const d=sr[String(c.id)]; return d&&d.reps>0&&d.due>now; }).length;
  document.getElementById('s-new').textContent = newCount;
  document.getElementById('s-review').textContent = dueCount;
  document.getElementById('s-done').textContent = doneCount;
}

// ══════════ CARD RENDER ══════════
function renderCard(){
  const c = deckCards[idx % deckCards.length];
  flipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('flip-hint').classList.remove('hidden');
  document.getElementById('answer-row').classList.add('hidden');
  document.getElementById('c-emoji').textContent = c.emoji || '🔤';
  document.getElementById('c-emoji-b').textContent = c.emoji || '🔤';
  const tc = TYPE_COLORS[c.type]||["#EEEDFE","#3C3489"];
  const badge = document.getElementById('c-badge');
  badge.textContent = c.type;
  badge.style.background = tc[0];
  badge.style.color = tc[1];
  document.getElementById('c-word').textContent = c.word;
  document.getElementById('c-phonetic').textContent = c.phonetic||'';
  // SR durum badge
  const srStatus = cardStatus(c);
  const srBadgeEl = document.getElementById('sr-status');
  if(srBadgeEl){
    const srD = getSRData()[String(c.id)];
    if(srStatus==='new') { srBadgeEl.textContent='🆕 Yeni'; srBadgeEl.style.background='#E6F1FB'; srBadgeEl.style.color='#0C447C'; }
    else if(srStatus==='due') { srBadgeEl.textContent='🔁 Tekrar vakti'; srBadgeEl.style.background='#FAEEDA'; srBadgeEl.style.color='#633806'; }
    else { 
      const days = Math.ceil((srD.due - Date.now())/86400000);
      srBadgeEl.textContent=`✓ ${days}g sonra`; 
      srBadgeEl.style.background='#EAF3DE'; srBadgeEl.style.color='#27500A'; 
    }
  }
  document.getElementById('c-tr').textContent = c.tr;
  const exCont = document.getElementById('c-examples');
  exCont.innerHTML = '';
  (c.examples||[]).forEach(e=>{
    const row = document.createElement('div');
    row.className = 'ex-row';
    const bc = BADGE_COLOR[e.t]||'#eee';
    const bt = BADGE_TEXT[e.t]||'#333';
    row.innerHTML = `<span class="ex-badge" style="background:${bc};color:${bt}">${BADGE_LABEL[e.t]||e.t}</span><div class="ex-text"><span class="ex-en">${e.en}</span><br>${e.tr}</div>`;
    exCont.appendChild(row);
  });
}

function flipCard(){
  flipped = !flipped;
  document.getElementById('card-inner').classList.toggle('flipped', flipped);
  document.getElementById('flip-hint').classList.toggle('hidden', flipped);
  document.getElementById('answer-row').classList.toggle('hidden', !flipped);
  if(flipped && !muted) speak();
  if(flipped){
    const c = deckCards[idx % deckCards.length];
    const sr = getSRData();
    const d = sr[String(c.id)] || {ease:2.5, interval:0, reps:0};
    const DAY = 86400000;
    // Preview intervals
    const calcInterval = (q) => {
      let ease = Math.max(1.3, d.ease + (0.1-(5-q)*(0.08+(5-q)*0.02)));
      if(q<3) return 1;
      let iv = d.reps===0?1 : d.reps===1?6 : Math.round(d.interval*ease);
      return iv;
    };
    const fmtDays = n => n===1?'yarın':n+'g';
    document.getElementById('int-again').textContent='yeniden';
    document.getElementById('int-good').textContent=fmtDays(calcInterval(3));
    document.getElementById('int-easy').textContent=fmtDays(calcInterval(5));
  }
}

function speak(){
  if(muted || !window.speechSynthesis) return;
  const c = deckCards[idx % deckCards.length];
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(c.word);
  u.lang = 'en-US'; u.rate = 0.82; u.pitch = 1;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v=>v.lang.startsWith('en-')&&v.name.toLowerCase().includes('female'))
         || voices.find(v=>v.lang.startsWith('en-')) || null;
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
speechSynthesis.onvoiceschanged = ()=>{};

function answer(type){
  // Map button → SM-2 quality score
  const quality = type==='again' ? 0 : type==='good' ? 3 : 5;
  const card = deckCards[idx % deckCards.length];
  const result = sm2(card, quality);

  session.done++;
  session[type] = (session[type]||0)+1;
  saveStats();

  // Show next interval as feedback
  const dayStr = result.interval === 1 ? '1 gün' : result.interval + ' gün';
  showToast(type==='again' ? '🔁 Tekrar' : type==='good' ? `✓ ${dayStr} sonra` : `⭐ ${dayStr} sonra`);

  // Move to next — re-sort queue so due cards bubble up
  idx++;
  if(idx >= deckCards.length){
    // Re-sort with updated SR data
    const base = currentDeck==="Tümü" ? [...allCards] : allCards.filter(c=>c.deck===currentDeck);
    deckCards = getPriorityCards(base);
    idx = 0;
  }

  updateDeckStats();
  updateProg();
  renderCard();
}

function updateProg(){
  const now = Date.now();
  const sr = getSRData();
  const total = deckCards.length;
  const learned = deckCards.filter(c=>{ const d=sr[String(c.id)]; return d&&d.reps>0&&d.due>now; }).length;
  const pct = total ? Math.round(learned/total*100) : 0;
  document.getElementById('prog').style.width = pct+'%';
}

function toggleMute(){
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if(muted) speechSynthesis.cancel();
}

    document.getElementById('scr-'+s).classList.toggle('hidden', s!==name);
    document.getElementById('hdr-'+s).classList.toggle('hidden', s!==name);
    document.getElementById('nav-'+s).classList.toggle('active', s===name);

function renderDecks(){
  const dl = document.getElementById('deck-list');
  const deckNames = [...new Set(allCards.map(c=>c.deck))];
  const colors = {
    "Phrasal Verbs":["#EEEDFE","#3C3489"],
    "Günlük Fiiller":["#EAF3DE","#27500A"],
    "İsimler":["#E6F1FB","#0C447C"],
    "Film İfadeleri":["#FAEEDA","#633806"],
    "Sıfatlar":["#FAECE7","#712B13"],
    "Zarflar":["#FCEBEB","#A32D2D"],
    "Edatlar":["#E1F5EE","#085041"],
    "Özel":["#F1EFE8","#444441"],
  };
  const icons = {"Phrasal Verbs":"🔤","Günlük Fiiller":"⚡","İsimler":"📦","Film İfadeleri":"🎬","Sıfatlar":"🎨","Zarflar":"💨","Edatlar":"🔗","Özel":"⭐"};
  const srNow = getSRData();
  const nowTs = Date.now();
  dl.innerHTML = deckNames.map(name=>{
    const cnt = allCards.filter(c=>c.deck===name).length;
    const [bg,tc] = colors[name]||["#f5f5f4","#333"];
    const deckBase2 = allCards.filter(c=>c.deck===name);
    const dueNow = deckBase2.filter(c=>{ const d=srNow[String(c.id)]; return d&&d.reps>0&&d.due<=nowTs; }).length;
    const newNow = deckBase2.filter(c=>{ const d=srNow[String(c.id)]; return !d||d.reps===0; }).length;
    const totalDue = dueNow + newNow;
    const learnedPct = cnt>0 ? Math.round((cnt-newNow)/cnt*100) : 0;
    return `<div class="deck-item" onclick="setDeck('${name}');showScreen('study');">
      <div class="deck-left">
        <span class="deck-icon">${icons[name]||'📚'}</span>
        <div><div class="deck-name">${name}</div><div class="deck-cnt">${cnt} kart · ${learnedPct}% öğrenildi</div></div>
      </div>
      <span class="due-badge" style="background:${bg};color:${tc}">${totalDue > 0 ? totalDue+' tekrar' : '✓ tamam'}</span>
    </div>`;
  }).join('');
}

function saveCard(){
  const word = document.getElementById('inp-word').value.trim();
  const tr = document.getElementById('inp-tr').value.trim();
  if(!word||!tr){showToast('Kelime ve anlam zorunlu!'); return;}
  const blocks = document.querySelectorAll('.example-block');
  const examples = [];
  blocks.forEach(b=>{
    const en=(b.querySelector('[id$="-en"]')?.value||'').trim();
    const ttr=(b.querySelector('[id$="-tr"]')?.value||'').trim();
    const t=(b.querySelector('[id$="-t"]')?.value||'SP');
    if(en&&ttr) examples.push({t,en,tr:ttr});
  });
  const newCard = {
    id: Date.now(),
    word,
    tr,
    phonetic: document.getElementById('inp-phonetic').value.trim(),
    type: document.getElementById('inp-type').value,
    deck: document.getElementById('inp-deck').value,
    emoji: document.getElementById('inp-emoji').value.trim()||'🔤',
    examples,
  };
  allCards.push(newCard);
  saveCards();
  showToast('Kart kaydedildi! ✓');
  setTimeout(()=>showScreen('study'),800);
  setDeck(currentDeck);
}

function renderStats(){
  document.getElementById('st-total').textContent = allCards.length;
  const total = session.done;
  const good = (session.good||0)+(session.easy||0);
  const pct = total ? Math.round(good/total*100) : 0;
  document.getElementById('st-pct').textContent = pct+'%';
}
function renderStatsScreen(){
  renderStats();
  // Week chart
  const weekData = [3,7,5,12,8,15,session.done%20||10];
  const days = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];
  const max = Math.max(...weekData,1);
  document.getElementById('week-bars').innerHTML = weekData.map(v=>`<div class="chart-bar" style="height:${Math.round(v/max*100)}%"></div>`).join('');
  document.getElementById('week-labels').innerHTML = weekData.map((v,i)=>`<div class="chart-label">${days[i]}<br>${v}</div>`).join('');
  // Tenses
  const tenses=[
    {l:"Simple Present",p:52,c:"#378ADD"},
    {l:"Simple Past",p:18,c:"#639922"},
    {l:"Simple Future",p:9,c:"#EF9F27"},
    {l:"Pres. Continuous",p:11,c:"#7F77DD"},
    {l:"Present Perfect",p:10,c:"#D85A30"},
  ];
  document.getElementById('tense-bars').innerHTML = tenses.map(t=>`<div class="tense-row">
    <div class="tense-label">${t.l}</div>
    <div class="tense-bar-bg"><div class="tense-bar" style="width:${t.p}%;background:${t.c}"></div></div>
    <div class="tense-pct">${t.p}%</div>
  </div>`).join('');
  // Streak dots
  const today = new Date().getDate();
  document.getElementById('streak-dots').innerHTML = Array.from({length:30},(_,i)=>`<div class="streak-dot${i<6?' done':i===6?' today':''}"></div>`).join('');
}

// ══════════ PWA ══════════
let deferredPrompt = null;
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
}
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('install-btn').classList.remove('hidden');
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-btn').classList.add('hidden');});
}

// ══════════ TOAST ══════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
</script>
